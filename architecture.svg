<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg">
  <title>Backend Architecture Diagram</title>
  <desc>Layered backend architecture with DTOs connected to both Controllers and Services</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="660" fill="#ffffff"/>

  <!-- Swagger UI -->
  <rect x="200" y="20" width="220" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#085041" x="310" y="40" text-anchor="middle" dominant-baseline="central">Swagger UI</text>
  <text font-family="sans-serif" font-size="12" fill="#085041" x="310" y="57" text-anchor="middle" dominant-baseline="central">API testing &amp; documentation</text>

  <!-- Arrow: Swagger → Controllers -->
  <line x1="310" y1="68" x2="310" y2="100" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Controllers -->
  <rect x="130" y="102" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#0C447C" x="290" y="122" text-anchor="middle" dominant-baseline="central">Controllers</text>
  <text font-family="sans-serif" font-size="12" fill="#0C447C" x="290" y="142" text-anchor="middle" dominant-baseline="central">Handle HTTP requests &amp; responses</text>

  <!-- DTOs box -->
  <rect x="490" y="112" width="150" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#3C3489" x="565" y="132" text-anchor="middle" dominant-baseline="central">DTOs</text>
  <text font-family="sans-serif" font-size="12" fill="#3C3489" x="565" y="150" text-anchor="middle" dominant-baseline="central">Data transfer objects</text>

  <!-- Dashed: Controllers → DTOs -->
  <path d="M450 130 L490 130" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Arrow: Controllers → Services -->
  <line x1="310" y1="158" x2="310" y2="190" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services -->
  <rect x="130" y="192" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#0C447C" x="290" y="212" text-anchor="middle" dominant-baseline="central">Services</text>
  <text font-family="sans-serif" font-size="12" fill="#0C447C" x="290" y="232" text-anchor="middle" dominant-baseline="central">Business logic &amp; orchestration</text>

  <!-- Dashed: Services → DTOs (L-shaped) -->
  <path d="M450 220 L470 220 L470 152 L490 152" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Arrow: Services → Repositories -->
  <line x1="310" y1="248" x2="310" y2="280" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Repositories -->
  <rect x="130" y="282" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#0C447C" x="290" y="302" text-anchor="middle" dominant-baseline="central">Repositories</text>
  <text font-family="sans-serif" font-size="12" fill="#0C447C" x="290" y="322" text-anchor="middle" dominant-baseline="central">Data access &amp; queries</text>

  <!-- Arrow: Repositories → Models -->
  <line x1="310" y1="338" x2="310" y2="370" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Models -->
  <rect x="130" y="372" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#712B13" x="290" y="392" text-anchor="middle" dominant-baseline="central">Models</text>
  <text font-family="sans-serif" font-size="12" fill="#712B13" x="290" y="412" text-anchor="middle" dominant-baseline="central">Domain entities &amp; data shapes</text>

  <!-- Arrow: Models → Data -->
  <line x1="310" y1="428" x2="310" y2="460" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data -->
  <rect x="130" y="462" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#633806" x="290" y="482" text-anchor="middle" dominant-baseline="central">Data</text>
  <text font-family="sans-serif" font-size="12" fill="#633806" x="290" y="502" text-anchor="middle" dominant-baseline="central">Database context &amp; configuration</text>

  <!-- Migrations -->
  <rect x="10" y="462" width="100" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#444441" x="60" y="482" text-anchor="middle" dominant-baseline="central">Migrations</text>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="60" y="502" text-anchor="middle" dominant-baseline="central">Schema versioning</text>

  <!-- Dashed: Migrations → Data -->
  <path d="M110 490 L130 490" fill="none" stroke="#888888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Arrow: Data → Database -->
  <line x1="310" y1="518" x2="310" y2="550" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Database -->
  <rect x="180" y="552" width="260" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="600" fill="#444441" x="310" y="572" text-anchor="middle" dominant-baseline="central">Database</text>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="310" y="589" text-anchor="middle" dominant-baseline="central">Persistent storage</text>

</svg>